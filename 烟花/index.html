<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Fireworks</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap">
  <style>
    * { position: relative; box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    html { background: #000; overflow: hidden; }
    body { overflow: hidden; color: rgba(255,255,255,0.5); font-family: 'Russo One', arial, sans-serif; line-height: 1.25; letter-spacing: 0.06em; touch-action: manipulation; }
    .hide { opacity: 0; visibility: hidden; }
    .remove { display: none !important; }
    .container { height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    .loading-init { width: 100%; align-self: center; text-align: center; text-transform: uppercase; }
    .loading-init__header { font-size: 2.2em; }
    .loading-init__status { margin-top: 1em; font-size: 0.8em; opacity: 0.75; }
    .stage-container { width: 100%; height: 100%; overflow: hidden; border: 1px solid #222; margin: -1px; }
    @media (max-width: 840px) { .stage-container { border: none; margin: 0; } }
    .canvas-container { width: 100%; height: 100%; }
    .canvas-container canvas { position: absolute; mix-blend-mode: lighten; transform: translateZ(0); z-index: 1; }
    .controls { position: absolute; top: 0; width: 100%; padding-bottom: 50px; display: flex; justify-content: space-between; z-index: 60; }
    .controls .btn { pointer-events: auto; cursor: pointer; }
    .menu { position: fixed; top: 0; right: 0; bottom: 0; width: 320px; max-width: 85%; background: rgba(30,30,30,0.95); transform: translateX(100%); transition: transform 0.3s ease-out; z-index: 100; overflow: hidden; pointer-events: none; }
    .menu.show { transform: translateX(0); pointer-events: auto; }
    .menu__inner-wrap { display: flex; flex-direction: column; height: 100%; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .menu__header { font-size: 1.5em; text-transform: uppercase; text-align: center; padding: 10px 0 20px; flex-shrink: 0; }
    .menu__close-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
    .menu__close-btn:hover { opacity: 1; }
    .menu form { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .menu .form-option { display: flex; align-items: center; margin: 14px 0; }
    .menu .form-option label { display: block; width: 45%; padding-right: 10px; text-align: right; text-transform: uppercase; user-select: none; font-size: 0.85em; }
    .menu .form-option--select select { display: block; width: 55%; height: 28px; font-size: 0.9rem; font-family: 'Russo One', arial, sans-serif; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; background: transparent; border: 1px solid rgba(255,255,255,0.5); }
    .menu .form-option--select select option { background: #000; }
    .menu .form-option--checkbox input { display: block; width: 24px; height: 24px; margin: 0; opacity: 0.5; }
    .menu .credits { padding-top: 16px; font-size: 0.75em; text-align: center; opacity: 0.6; flex-shrink: 0; }
    .menu .credits a { color: rgba(255,255,255,0.5); }
    .btn { opacity: 0.5; width: 50px; height: 50px; display: flex; user-select: none; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.75; }
    .btn svg { display: block; margin: auto; }
    .credits { margin-top: auto; margin-bottom: 10px; padding-top: 6px; font-size: 0.8em; opacity: 0.75; }
    .credits a { color: rgba(255,255,255,0.5); text-decoration: none; }
    .credits a:hover, .credits a:active { color: rgba(255,255,255,0.75); text-decoration: underline; }
  </style>
</head>

<body>
  <!-- SVG Spritesheet -->
  <div style="height: 0; width: 0; position: absolute; visibility: hidden;">
    <svg xmlns="http://www.w3.org/2000/svg">
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z" />
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path
          d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <path
          d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z" />
      </symbol>
      <symbol id="icon-sound-on" viewBox="0 0 24 24">
        <path
          d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
      </symbol>
      <symbol id="icon-sound-off" viewBox="0 0 24 24">
        <path
          d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
      </symbol>
    </svg>
  </div>

  <!-- App -->
  <div class="container">
    <div class="loading-init">
      <div class="loading-init__header">Loading</div>
      <div class="loading-init__status">Assembling Shells</div>
    </div>
    <div class="stage-container remove">
      <div class="canvas-container">
        <canvas id="trails-canvas"></canvas>
        <canvas id="main-canvas"></canvas>
      </div>
      <div class="controls">
        <div class="btn pause-btn" onclick="window.__togglePause && window.__togglePause()">
          <svg fill="white" width="24" height="24">
            <use href="#icon-pause" xlink:href="#icon-pause"></use>
          </svg>
        </div>
        <div class="btn sound-btn" onclick="window.__toggleSound && window.__toggleSound()">
          <svg fill="white" width="24" height="24">
            <use href="#icon-sound-off" xlink:href="#icon-sound-off"></use>
          </svg>
        </div>
        <div class="btn settings-btn" onclick="window.__toggleMenu && window.__toggleMenu()">
          <svg fill="white" width="24" height="24">
            <use href="#icon-settings" xlink:href="#icon-settings"></use>
          </svg>
        </div>
      </div>
      <div class="menu">
        <div class="menu__inner-wrap">
          <div class="menu__close-btn" title="关闭" onclick="window.__toggleMenu && window.__toggleMenu(false)">
            <svg fill="white" width="24" height="24">
              <use href="#icon-close" xlink:href="#icon-close"></use>
            </svg>
          </div>
          <div class="menu__header">设置</div>
          <form>
            <div class="form-option form-option--select">
              <label class="shell-type-label" title="选择烟花类型">烟花类型</label>
              <select class="shell-type"></select>
            </div>
            <div class="form-option form-option--select">
              <label class="shell-size-label" title="烟花的大小，数值越大爆炸越壮观">烟花大小</label>
              <select class="shell-size"></select>
            </div>
            <div class="form-option form-option--select">
              <label class="quality-ui-label" title="画面质量，质量越高效果越细腻但更耗性能">画面质量</label>
              <select class="quality-ui"></select>
            </div>
            <div class="form-option form-option--select">
              <label class="sky-lighting-label" title="爆炸时的天空照明效果">天空照明</label>
              <select class="sky-lighting"></select>
            </div>
            <div class="form-option form-option--select">
              <label class="scaleFactor-label" title="画布缩放比例">缩放比例</label>
              <select class="scaleFactor"></select>
            </div>
            <div class="form-option form-option--checkbox">
              <label class="auto-launch-label" title="自动发射烟花，无需手动点击">自动发射</label>
              <input class="auto-launch" type="checkbox" />
            </div>
            <div class="form-option form-option--checkbox form-option--finale-mode">
              <label class="finale-mode-label" title="开启后所有烟花集中燃放，营造压轴效果">压轴模式</label>
              <input class="finale-mode" type="checkbox" />
            </div>
            <div class="form-option form-option--checkbox form-option--fullscreen">
              <label class="fullscreen-label" title="切换到全屏显示">全屏显示</label>
              <input class="fullscreen" type="checkbox" />
            </div>
            <div class="form-option form-option--checkbox">
              <label class="long-exposure-label" title="开启长曝光效果，画面会保留烟花轨迹">长曝光</label>
              <input class="long-exposure" type="checkbox" />
            </div>
          </form>
          <div class="credits">
            由 <a href="https://cmiller.tech/" target="_blank">Caleb Miller</a> 倾力打造
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- partial -->
  <script src='https://s3-us-west-2.amazonaws.com/s.cdpn.io/329180/fscreen%401.0.1.js'></script>
  <script src='https://s3-us-west-2.amazonaws.com/s.cdpn.io/329180/Stage%400.1.4.js'></script>
  <script src='https://s3-us-west-2.amazonaws.com/s.cdpn.io/329180/MyMath.js'></script>
  <script src="./1.js"></script>
</body>

</html>
