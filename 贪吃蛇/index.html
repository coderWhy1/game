<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body>
    <div class="game-container">
      <div class="lawn">
        <div class="wall-wrap">
          <div class="wall-top"></div>
          <div class="wall-left"></div>
          <div class="wall-right"></div>
          <div class="wall-bottom"></div>
        </div>
        <div class="core">
          <div class="food-wrap"></div>
          <div class="snake"></div>
        </div>
        <div class="start-mask">
          <a href="javascript:;" class="start"></a>
        </div>
        <div class="control-mask">
          <a href="javascript:;" class="control"></a>
        </div>
      </div>
    </div>
    <div class="direction-pad">
      <div class="pad-row">
        <button class="direction-btn" data-dir="top">↑</button>
      </div>
      <div class="pad-row">
        <button class="direction-btn" data-dir="left">←</button>
        <div class="direction-btn-placeholder"></div>
        <button class="direction-btn" data-dir="right">→</button>
      </div>
      <div class="pad-row">
        <button class="direction-btn" data-dir="bottom">↓</button>
      </div>
    </div>
    <audio loop="loop" class="audio">
      <source src="./music/失去才懂.mp3" type="audio/mpeg" />
    </audio>
    <script src="./js/main.js"></script>
  </body>
</html>
