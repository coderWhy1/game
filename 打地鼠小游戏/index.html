<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover"
    />

    <title>超级打地鼠</title>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: auto;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        touch-action: manipulation;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "PingFang SC", sans-serif;

        background: radial-gradient(
          circle at top,
          #7c3aed,
          #312e81 45%,
          #111827 100%
        );
      }

      /* 背景 */
      .bg {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      .light {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.5;
        animation: move 12s infinite alternate;
      }

      .light1 {
        width: 400px;
        height: 400px;
        background: #06b6d4;
        left: -100px;
        top: -100px;
      }

      .light2 {
        width: 350px;
        height: 350px;
        background: #ec4899;
        right: -100px;
        bottom: -100px;
      }

      @keyframes move {
        from {
          transform: translate(0, 0);
        }

        to {
          transform: translate(60px, 50px);
        }
      }

      /* 主体 */
      .game {
        position: relative;
        z-index: 2;

        width: 560px;
        max-width: 95vw;

        padding: 28px;

        border-radius: 34px;

        background: rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(20px);

        border: 1px solid rgba(255, 255, 255, 0.1);

        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }

      /* 顶部 */
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      .title-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo {
        width: 70px;
        height: 70px;

        border-radius: 20px;

        display: flex;
        justify-content: center;
        align-items: center;

        font-size: 42px;

        background: linear-gradient(135deg, #f59e0b, #ef4444);

        box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
      }

      .title h1 {
        color: #fff;
        font-size: 38px;
      }

      .title p {
        color: rgba(255, 255, 255, 0.7);
        margin-top: 6px;
      }

      .panel {
        display: flex;
        gap: 14px;
      }

      .card {
        width: 100px;
        padding: 14px;

        border-radius: 22px;

        text-align: center;

        color: #fff;

        background: rgba(255, 255, 255, 0.08);
      }

      .card-label {
        opacity: 0.7;
        margin-bottom: 8px;
      }

      .card-value {
        font-size: 34px;
        font-weight: bold;
      }

      /* 游戏区域 */
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }

      .hole {
        position: relative;
        aspect-ratio: 1;

        overflow: hidden;

        border-radius: 28px;

        background: linear-gradient(180deg, #334155, #0f172a);

        box-shadow:
          inset 0 10px 18px rgba(255, 255, 255, 0.05),
          inset 0 -14px 20px rgba(0, 0, 0, 0.45),
          0 12px 24px rgba(0, 0, 0, 0.3);

        cursor: pointer;
      }

      /* 草地 */
      .grass {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 28%;
        z-index: 3;

        background: linear-gradient(180deg, #22c55e, #15803d);
      }

      /* 地鼠 */
      .mole {
        position: absolute;

        left: 50%;
        bottom: 20%;

        transform: translate(-50%, 120%);

        transition: transform 0.22s ease;

        font-size: 72px;

        z-index: 2;
      }

      .mole.active {
        transform: translate(-50%, 0);
      }

      .mole.hit {
        transform: translate(-50%, 20%) scale(0.7) rotate(12deg);
      }

      /* 特效 */
      .effect {
        position: absolute;

        left: 50%;
        top: 40%;

        transform: translate(-50%, -50%);

        z-index: 20;

        color: #fde047;

        font-size: 30px;
        font-weight: 900;

        text-shadow: 0 0 12px rgba(253, 224, 71, 0.8);

        pointer-events: none;

        animation: float 0.8s forwards;
      }

      @keyframes float {
        from {
          opacity: 1;
          transform: translateY(0);
        }

        to {
          opacity: 0;
          transform: translateY(-50px);
        }
      }

      /* footer */
      .footer {
        margin-top: 22px;
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
      }

      /* 弹窗 */
      .modal {
        position: fixed;
        inset: 0;

        display: none;
        justify-content: center;
        align-items: center;

        background: rgba(0, 0, 0, 0.55);

        z-index: 99;
      }

      .modal.show {
        display: flex;
      }

      .modal-box {
        width: 340px;
        max-width: 88vw;

        padding: 28px;

        border-radius: 26px;

        text-align: center;

        color: #fff;

        background: rgba(255, 255, 255, 0.1);

        backdrop-filter: blur(14px);

        animation: pop 0.25s;
      }

      @keyframes pop {
        from {
          transform: scale(0.8);
          opacity: 0;
        }

        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-icon {
        font-size: 52px;
        margin-bottom: 12px;
      }

      .modal-title {
        font-size: 28px;
        font-weight: 900;
        margin-bottom: 10px;
      }

      .modal-desc {
        line-height: 1.7;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.82);
        margin-bottom: 22px;
      }

      .btn {
        border: none;
        cursor: pointer;

        padding: 12px 32px;

        border-radius: 999px;

        color: #fff;
        font-size: 17px;
        font-weight: bold;

        background: linear-gradient(135deg, #06b6d4, #3b82f6);

        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.35);
      }
      #nextBtn {
        margin: 12px auto 0;
        letter-spacing: 4px;
      }
      /* 手机 */
      @media (max-width: 560px) {
        .top {
          flex-direction: column;
          gap: 18px;
        }

        .title h1 {
          font-size: 32px;
        }

        .grid {
          gap: 14px;
        }

        .mole {
          font-size: 58px;
        }

        .modal-box {
          width: 300px;
          padding: 24px 20px;
          border-radius: 22px;
        }

        .modal-icon {
          font-size: 44px;
        }

        .modal-title {
          font-size: 24px;
        }

        .btn {
          padding: 10px 26px;
          font-size: 15px;
        }
      }
    </style>
  </head>

  <body>
    <div class="bg">
      <div class="light light1"></div>
      <div class="light light2"></div>
    </div>

    <!-- 音乐 -->
    <audio id="bgm" loop preload="auto" src="./bgm.mp3"></audio>

    <audio id="hit" preload="auto" src="./hit.mp3"></audio>

    <div class="game">
      <div class="top">
        <div class="title-wrap">
          <div class="logo">🐹</div>

          <div class="title">
            <h1>打地鼠</h1>
            <p>超级欢乐小游戏</p>
          </div>
        </div>

        <div class="panel">
          <div class="card">
            <div class="card-label">关卡</div>
            <div class="card-value" id="level">1</div>
          </div>
          <div class="card">
            <div class="card-label">得分</div>
            <div class="card-value" id="score">0</div>
          </div>
          <div class="card">
            <div class="card-label">时间</div>
            <div class="card-value" id="time">40</div>
          </div>
        </div>
      </div>

      <div class="grid" id="grid"></div>

      <div class="footer">疯狂点击地鼠获得分数</div>
    </div>

    <!-- 开始 -->
    <div class="modal show" id="startModal">
      <div class="modal-box">
        <div class="modal-icon">🎮</div>

        <div class="modal-title">超级打地鼠</div>

        <div class="modal-desc">
          40秒内疯狂点击地鼠<br />
          看看你能获得多少分
        </div>

        <button class="btn" id="startBtn">开始游戏</button>
      </div>
    </div>

    <!-- 结束 -->
    <div class="modal" id="endModal">
      <div class="modal-box">
        <div class="modal-icon">🎉</div>

        <div class="modal-title">游戏结束</div>

        <div class="modal-desc" id="finalScore"></div>

        <button class="btn" id="restartBtn">再玩一次</button>
        <button class="btn" id="nextBtn">下一关</button>
      </div>
    </div>

    <script>
      const GAME_TIME = 40;
      const HOLE_COUNT = 9;

      const grid = document.getElementById("grid");

      const scoreEl = document.getElementById("score");

      const timeEl = document.getElementById("time");

      const startModal = document.getElementById("startModal");

      const endModal = document.getElementById("endModal");

      const finalScore = document.getElementById("finalScore");

      const bgm = document.getElementById("bgm");

      const hit = document.getElementById("hit");

      const levelEl = document.getElementById("level");

      let level = 1;
      let score = 0;
      let time = GAME_TIME;
      let playing = false;
      let currentIndex = -1;

      let gameTimer = null;
      let moleTimer = null;

      bgm.volume = 0.35;
      hit.volume = 0.5;
      let loopTimer = 950;

      /* 创建洞 */
      function createHoles() {
        grid.innerHTML = "";

        for (let i = 0; i < HOLE_COUNT; i++) {
          const hole = document.createElement("div");

          hole.className = "hole";

          const mole = document.createElement("div");

          mole.className = "mole";

          const emojis = ["🐹", "🐭", "🐰", "🐻"];

          mole.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

          const grass = document.createElement("div");

          grass.className = "grass";

          hole.appendChild(mole);
          hole.appendChild(grass);

          hole.addEventListener("click", (e) => hitMole(i, hole, e));

          grid.appendChild(hole);
        }
      }

      function getMoles() {
        return document.querySelectorAll(".mole");
      }

      function showMole() {
        const moles = getMoles();

        moles.forEach((m) => {
          m.classList.remove("active", "hit");
        });

        let next = Math.floor(Math.random() * HOLE_COUNT);

        while (next === currentIndex) {
          next = Math.floor(Math.random() * HOLE_COUNT);
        }

        currentIndex = next;

        moles[currentIndex].classList.add("active");
      }

      function loop() {
        if (!playing) return;

        showMole();

        /**
         * 地鼠出现时间：
         * 720ms ~ 850ms 随机
         */
        // const min = 750;
        // const max = 900;

        // const delay =
        //   Math.floor(
        //     Math.random() * (max - min + 1)
        //   ) + min;

        moleTimer = setTimeout(loop, loopTimer);
      }

      function playHit() {
        const sound = hit.cloneNode();

        sound.volume = 0.5;

        sound.play().catch(() => {});
      }

      function effect(hole) {
        const div = document.createElement("div");

        div.className = "effect";

        /**
         * 随机文字
         */
        const texts = ["+1", "Perfect!", "Awesome!", "Great!", "Cool!"];

        div.innerHTML = texts[Math.floor(Math.random() * texts.length)];

        /**
         * 固定在洞中心
         */
        div.style.left = "50%";

        div.style.top = "40%";

        div.style.transform = "translate(-50%, -50%)";

        hole.appendChild(div);

        setTimeout(() => {
          div.remove();
        }, 800);
      }

      function hitMole(index, hole, e) {
        if (!playing) return;

        if (index !== currentIndex) return;

        score++;

        scoreEl.textContent = score;

        playHit();

        const mole = getMoles()[currentIndex];

        mole.classList.remove("active");

        mole.classList.add("hit");

        effect(hole);

        currentIndex = -1;
      }

      function reset() {
        clearInterval(gameTimer);

        clearTimeout(moleTimer);
      }

      function startGame() {
        reset();

        score = 0;
        time = GAME_TIME;
        playing = true;
        currentIndex = -1;

        scoreEl.textContent = score;
        timeEl.textContent = time;

        startModal.classList.remove("show");
        endModal.classList.remove("show");

        bgm.currentTime = 0;

        bgm.play().catch(() => {});

        loop();

        gameTimer = setInterval(() => {
          time--;

          timeEl.textContent = time;

          if (time <= 0) {
            endGame();
          }
        }, 1000);
      }

      function endGame() {
        playing = false;

        reset();

        bgm.pause();

        getMoles().forEach((m) => {
          m.classList.remove("active");
        });

        let level = "";

        if (score >= 40) {
          level = "🔥 地鼠之王";
        } else if (score >= 25) {
          level = "⚡ 超级高手";
        } else if (score >= 15) {
          level = "🎯 打鼠达人";
        } else {
          level = "😊 再接再厉";
        }

        finalScore.innerHTML = `
          <div style="
            font-size:18px;
            margin-bottom:10px;
          ">
            ${level}
          </div>

          <div style="font-size:14px;">
            最终得分
          </div>

          <div style="
            font-size:52px;
            font-weight:900;
            color:#fde047;
            margin:8px 0 12px;
          ">
            ${score}
          </div>
        `;
        if (score >= 15) {
          document.getElementById("nextBtn").style.display = "block";
        } else {
          document.getElementById("nextBtn").style.display = "none";
        }
        endModal.classList.add("show");
      }

      function nextLevel() {
        loopTimer -= 50;
        level++;
        levelEl.textContent = level;
        startGame();
      }

      document.addEventListener(
        "touchmove",
        function (e) {
          if (e.target.closest(".modal-box")) return;
          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener(
        "touchstart",
        function (e) {
          if (e.touches.length > 1) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      let lastTouchEnd = 0;
      document.addEventListener(
        "touchend",
        function (e) {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
            e.preventDefault();
          }
          lastTouchEnd = now;
        },
        { passive: false },
      );

      window.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });

      window.addEventListener("gesturechange", function (e) {
        e.preventDefault();
      });

      window.addEventListener("gestureend", function (e) {
        e.preventDefault();
      });

      createHoles();

      document.getElementById("startBtn").addEventListener("click", startGame);

      document
        .getElementById("restartBtn")
        .addEventListener("click", startGame);

      document.getElementById("nextBtn").addEventListener("click", nextLevel);
    </script>
  </body>
</html>
